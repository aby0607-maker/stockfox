name: V2 Stock Data — Nightly Full Scoring

on:
  schedule:
    - cron: '30 19 * * 1-5'  # Weeknights 7:30 PM UTC (1 AM IST)
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to refresh (all, Large Cap, Mid Cap, Small Cap)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install scoring pipeline deps
        run: npm install vite-node

      - name: Create output directory
        run: mkdir -p public/data

      - name: "Full 3-pillar scoring pipeline"
        env:
          CMOTS_API_TOKEN: ${{ secrets.CMOTS_API_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
          TIER_OVERRIDE: ${{ github.event.inputs.tier }}
        run: |
          TIER="${TIER_OVERRIDE:-all}"
          echo "Running full 3-pillar scoring for tier: $TIER"
          echo "Profiles: priya, kavya, meera, sneha"
          npx vite-node scripts/precompute-full-scoring.ts -- --tier="$TIER"

      - name: Commit updated cache
        run: |
          git config user.name "StockFox Bot"
          git config user.email "bot@stockfox.pro"
          git add public/data/stock-cache.json
          git diff --staged --quiet || git commit -m "chore: update V2 stock data — full 3-pillar scoring"
          git push
