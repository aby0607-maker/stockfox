name: Pre-compute Stock Data

on:
  # Nightly at 7:30 PM UTC (1:00 AM IST) — after Indian market close
  schedule:
    - cron: '30 19 * * 1-5'  # Weekdays only (Mon-Fri)
  # Manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create output directory
        run: mkdir -p public/data

      - name: Run pre-computation script
        env:
          CMOTS_API_TOKEN: ${{ secrets.CMOTS_API_TOKEN }}
        run: node scripts/precompute-stocks.mjs

      - name: Commit and push cached data
        run: |
          git config user.name "StockFox Bot"
          git config user.email "bot@stockfox.pro"
          git add public/data/stock-cache.json
          git diff --staged --quiet || git commit -m "chore: update pre-computed stock data [skip ci]"
          git push
