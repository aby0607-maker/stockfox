name: V2 Stock Data — Nightly Full Scoring

on:
  schedule:
    - cron: '30 19 * * 1-5'  # Weeknights 7:30 PM UTC (1 AM IST)
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to refresh (Large Cap, Mid Cap, all)'
        required: false
        default: 'Large Cap'

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Large+Mid Cap only (~248 stocks, ~15 min)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install scoring pipeline deps
        run: npm install vite-node

      - name: Create output directory
        run: mkdir -p public/data

      - name: "Full 3-pillar scoring — Large + Mid Cap"
        env:
          CMOTS_API_TOKEN: ${{ secrets.CMOTS_API_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          INDIANAPI_KEY: ${{ secrets.INDIANAPI_KEY }}
          TIER_OVERRIDE: ${{ github.event.inputs.tier }}
        run: |
          TIER="${TIER_OVERRIDE:-Large Cap}"
          echo "Profiles: priya, kavya, meera, sneha"

          if [ -z "$TIER_OVERRIDE" ]; then
            # Default nightly: score Large Cap + Mid Cap (~248 stocks, ~15 min)
            echo "=== Nightly run: Large Cap ==="
            npx vite-node scripts/precompute-full-scoring.ts -- --tier="Large Cap"
            echo "=== Nightly run: Mid Cap ==="
            npx vite-node scripts/precompute-full-scoring.ts -- --tier="Mid Cap"
          else
            # Manual trigger: score requested tier only
            echo "=== Manual run: $TIER ==="
            npx vite-node scripts/precompute-full-scoring.ts -- --tier="$TIER"
          fi

      - name: Commit updated cache
        run: |
          git config user.name "StockFox Bot"
          git config user.email "bot@stockfox.pro"
          git add public/data/stock-cache.json
          git diff --staged --quiet || git commit -m "chore: update V2 stock data — full 3-pillar scoring"
          git push
