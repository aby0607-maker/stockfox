name: V2 Stock Data — Nightly Pre-computation

on:
  # Weeknights at 7:30 PM UTC (1:00 AM IST) — after Indian market close
  schedule:
    - cron: '30 19 * * 1-5'
  # Manual trigger with tier override
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to refresh (large, mid, small, all)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create output directory
        run: mkdir -p public/data

      - name: Run pre-computation script
        env:
          CMOTS_API_TOKEN: ${{ secrets.CMOTS_API_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIER_OVERRIDE: ${{ github.event.inputs.tier }}
        run: |
          if [ -n "$TIER_OVERRIDE" ] && [ "$TIER_OVERRIDE" != "all" ]; then
            node scripts/precompute-stocks.mjs --tier="$TIER_OVERRIDE"
          else
            node scripts/precompute-stocks.mjs
          fi

      - name: Commit updated static cache (fallback)
        run: |
          git config user.name "StockFox Bot"
          git config user.email "bot@stockfox.pro"
          git add public/data/stock-cache.json
          git diff --staged --quiet || git commit -m "chore: update V2 stock data [skip ci]"
          git push
